name: Build & Release Windows

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-win:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild better-sqlite3 for Windows
        run: npx @electron/rebuild -f -w better-sqlite3

      # Build React PUIS Electron sur le MÊME runner Windows
      - name: Build React
        run: npm run build:react

      - name: Verify dist/index.html exists
        run: |
          if (Test-Path "dist/index.html") {
            Write-Host "✅ dist/index.html found"
            Get-ChildItem dist/ -Recurse | Select-Object FullName
          } else {
            Write-Host "❌ dist/index.html NOT FOUND"
            exit 1
          }
        shell: pwsh

      - name: Build Windows installer
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: List dist-app
        run: dir dist-app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-app/*.exe
          retention-days: 3

  release:
    name: Create GitHub Release
    needs: build-win
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Moyens Généraux ${{ github.ref_name }}"
          draft: false
          prerelease: false
          body: |
            ## 📦 Moyens Généraux ${{ github.ref_name }}

            ### ⬇️ Installation Windows
            1. Télécharge `Moyens.Generaux.Setup.exe`
            2. Double-clique et installe
            3. Lance depuis le Bureau

            ### 🔐 Comptes par défaut
            | Utilisateur | Mot de passe | Rôle |
            |---|---|---|
            | `admin` | `admin123` | Chef Moyens Généraux |
            | `magasinier` | `mag123` | Magasinier |
            | `comptable` | `cpt123` | Comptable |
            | `agent` | `agt123` | Agent Administratif |
          files: artifacts/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}