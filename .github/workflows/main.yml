name: Build & Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (ex: v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_cmd: build:win
          - os: ubuntu-22.04
            build_cmd: build:linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev libnotify-dev libnss3 \
            libxss1 libasound2 libxtst6 xvfb \
            libgconf-2-4 libgbm-dev

      - name: Install dependencies
        run: npm install

      # Rebuild better-sqlite3 pour la bonne plateforme
      - name: Rebuild better-sqlite3
        run: npx @electron/rebuild -f -w better-sqlite3

      - name: Build app
        run: npm run ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: List dist-app
        run: ls dist-app/
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            dist-app/*.exe
            dist-app/*.AppImage
          retention-days: 3

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: "Moyens Généraux ${{ github.ref_name || inputs.tag }}"
          draft: false
          prerelease: false
          body: |
            ## 📦 Moyens Généraux ${{ github.ref_name || inputs.tag }}

            ### ⬇️ Téléchargement

            | Plateforme | Fichier |
            |---|---|
            | 🪟 Windows | `Moyens.Generaux.Setup.*.exe` |
            | 🐧 Linux   | `Moyens.Generaux-*.AppImage` |

            ### 🚀 Installation

            **Windows :** Télécharge le `.exe` → double-clique → installe → lance depuis le Bureau

            **Linux :**
            ```bash
            chmod +x Moyens.Generaux-*.AppImage
            ./Moyens.Generaux-*.AppImage
            ```

            ### 🔐 Comptes par défaut

            | Utilisateur | Mot de passe | Rôle |
            |---|---|---|
            | `admin` | `admin123` | Chef Moyens Généraux |
            | `magasinier` | `mag123` | Magasinier |
            | `comptable` | `cpt123` | Comptable |
            | `agent` | `agt123` | Agent Administratif |

            > ⚠️ Changez les mots de passe après la première connexion.
          files: |
            artifacts/**/*.exe
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
